apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-prod-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: contour
  tls:
    - hosts:
        - vault.prodv2.cedille.club
      secretName: vault-cedille-prod-tls
  rules:
    - host: vault.prodv2.cedille.club
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: vault-ui
                port:
                  number: 8200
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-cedille-prod-tls
spec:
  secretName: vault-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: vault.prodv2.cedille.club
  dnsNames:
    - vault.prodv2.cedille.club
