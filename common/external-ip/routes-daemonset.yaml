apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: routes
  namespace: metallb-system
spec:
  selector:
    matchLabels:
      app: routes
  template:
    metadata:
      labels:
        app: routes
    spec:
      hostNetwork: true
      containers:
        - name: routes
          image: alpine
          command:
            - /bin/sh
            - -c
          args:
            - |
              export VLAN_DEVICE=$(ip route | grep 142.137.247.0/24 | grep -oE 'dev\s+\S+' | awk '{print $2}' | head -n 1)
              if [ -z "$VLAN_DEVICE" ]; then
                echo "ERROR: could not find network interface for 142.137.247.0/24"
                exit 1
              fi
              echo "Using VLAN device: $VLAN_DEVICE"
              ip route add 142.137.247.0/24 dev $VLAN_DEVICE table 100 2>/dev/null || true
              ip route add default via 142.137.247.1 table 100 2>/dev/null || true
              # Deliberately no "ip rule add to 142.137.247.0/24 lookup 100" here:
              # that rule matched on destination only, so it hijacked ANY new
              # outbound connection to this /24 (e.g. ArgoCD reaching an
              # unrelated host in the same block), not just replies to services
              # exposed on our own public VIPs. Reply symmetry for those VIPs is
              # already guaranteed by the "from <vip>/32" rules below matching
              # on source, which is all that's needed.
              ip rule add from 142.137.247.75/32 lookup 100 2>/dev/null || true
              ip rule add from 142.137.247.76/32 lookup 100 2>/dev/null || true
              ip rule add from 142.137.247.78/32 lookup 100 2>/dev/null || true
              arp -s 142.137.247.101 00:00:5e:00:01:01 -i $VLAN_DEVICE
              arp -s 142.137.247.99 bc:24:11:19:3c:51 -i $VLAN_DEVICE
              exec sleep infinity
          securityContext:
            privileged: true
      terminationGracePeriodSeconds: 0
      tolerations:
        - operator: Exists
      nodeSelector:
        etsmtl.club/external-network: "true"
