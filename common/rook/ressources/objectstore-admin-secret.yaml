#################################################################################################################
# Rook needs the RGW admin-ops API credentials to manage buckets on the external object store. The RGW-side
# user "rgw-admin-ops-user" already exists on the Ceph cluster (caps: buckets=*, users=*, usage=read,
# metadata=read, zone=read, info=read) - it was provisioned for exactly this purpose but never wired up here.
#
# This resource only syncs that secret from Vault into this namespace; it contains no secret material itself.
# Before this works, the access/secret key must be pushed into Vault at:
#   kv-system/default_passwords/rgw-admin-ops-user
# with keys "accessKey" and "secretKey" (the field names Rook expects in the destination Secret).
#################################################################################################################
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: rook-ceph-external-auth
  namespace: rook-ceph-external  # namespace:cluster
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    audiences:
      - vault
    role: secret-reader
    serviceAccount: default
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: rgw-admin-ops-user
  namespace: rook-ceph-external  # namespace:cluster
spec:
  vaultAuthRef: rook-ceph-external-auth
  type: kv-v1
  mount: kv-system
  path: default_passwords/rgw-admin-ops-user
  destination:
    name: rgw-admin-ops-user
    create: true
